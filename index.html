<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>土石流防災即時資訊</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Microsoft JhengHei', sans-serif; }
        body { background: #f5f5f5; color: #333; line-height: 1.6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #d32f2f; text-align: center; margin-bottom: 20px; }
        .form-section { background: #ffebee; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #d32f2f; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #b71c1c; }
        .reports { margin-top: 30px; }
        .report-item { background: #fff3e0; padding: 15px; margin-bottom: 10px; border-left: 4px solid #ff9800; border-radius: 4px; }
        .report-item h3 { margin-bottom: 5px; color: #e65100; }
        .report-time { font-size: 0.9em; color: #666; }
        footer { text-align: center; margin-top: 30px; font-size: 0.9em; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️ 土石流防災即時資訊</h1>
        
        <div class="form-section">
            <h2>📝 通報土石流隱患</h2>
            <form id="reportForm">
                <div class="form-group">
                    <label for="location">地點：</label>
                    <input type="text" id="location" placeholder="例如：XX縣XX路XX號附近" required>
                </div>
                <div class="form-group">
                    <label for="description">詳細描述：</label>
                    <textarea id="description" rows="4" placeholder="請描述具體情況（如山牆裂痕、土石滑動等）" required></textarea>
                </div>
                <button type="submit">送出通報</button>
            </form>
        </div>

        <div class="reports">
            <h2>📋 近期通報列表</h2>
            <div id="reportList">
                <p>載入中...</p>
            </div>
        </div>

        <footer>
            <p>最後更新：<span id="updateTime"></span></p>
            <p>本系統為 AI 防災助理，自動收集並整理資訊。</p>
        </footer>
    </div>

    <script>
        const sampleReports = [
            { location: 'XX縣XX路50號', description: '山路邊坡出現裂痕，有土石滑落風險', time: '2025-03-10 00:00' },
            { location: 'OO市OO山道', description: '暴雨後斜坡不穩定，建議警戒', time: '2025-03-09 23:30' }
        ];

        function renderReports() {
            const list = document.getElementById('reportList');
            list.innerHTML = '';
            sampleReports.forEach(report => {
                const item = document.createElement('div');
                item.className = 'report-item';
                item.innerHTML = `
                    <h3>${report.location}</h3>
                    <p>${report.description}</p>
                    <div class="report-time">通報時間：${report.time}</div>
                `;
                list.appendChild(item);
            });
        }

        document.getElementById('reportForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const location = document.getElementById('location').value;
            const description = document.getElementById('description').value;
            const time = new Date().toLocaleString('zh-TW');
            sampleReports.unshift({ location, description, time });
            renderReports();
            alert('通報已送出！');
            this.reset();
        });

        renderReports();
        document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-TW');
    </script>
</body>
</html>
